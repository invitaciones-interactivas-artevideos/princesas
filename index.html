<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Invitación Real</title>
    
    <!-- Fuentes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- Librerías de Estilo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        [x-cloak] { display: none !important; }
        
        :root {
            --royal-dark: #020617;
            --royal-blue: #1e3a8a;
            --crystal-blue: #60a5fa;
            --gold: #d4af37;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--royal-dark);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .font-title { font-family: 'Great Vibes', cursive; }
        .font-royal { font-family: 'Cinzel Decorative', serif; }

        /* Fondo Mágico con Degradado y Brillo */
        .magic-bg {
            background: linear-gradient(180deg, #020617 0%, #1e3a8a 50%, #020617 100%);
            background-attachment: fixed;
            position: relative;
        }

        .magic-bg::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
            pointer-events: none;
            z-index: 1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* Animación Zapato */
        .shoe-float {
            animation: shoeFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(96, 219, 250, 0.7));
        }

        @keyframes shoeFloat {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .gold-text {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            width: 60%;
            margin: 2rem auto;
        }
    </style>
</head>
<body class="magic-bg" x-data="invitationData">

    <!-- PANTALLA DE BIENVENIDA -->
    <div x-show="!started" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950 p-6 text-center" x-transition.opacity>
        <div class="max-w-md animate__animated animate__fadeIn">
            <!-- ILUSTRACIÓN ZAPATO DE CRISTAL (SVG) -->
            <svg class="w-40 h-40 mx-auto mb-8 shoe-float" viewBox="0 0 200 200">
                <defs>
                    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
                        <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.6" />
                    </linearGradient>
                </defs>
                <path fill="url(#glass)" d="M160,130 C160,140 140,150 110,150 C70,150 40,130 30,100 C25,80 40,60 60,60 C70,60 85,75 100,95 C115,115 140,125 160,130 Z" />
                <circle cx="65" cy="70" r="3" fill="white">
                    <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
                </circle>
            </svg>
            
            <h2 class="font-royal text-2xl gold-text mb-4 tracking-widest uppercase">Bienvenidos a un Cuento de Hadas</h2>
            <p class="text-blue-200/70 mb-10 italic">Una noche mágica está por comenzar...</p>
            
            <button @click="startInvitation" class="px-10 py-4 bg-blue-700 hover:bg-blue-600 rounded-full font-bold tracking-[0.2em] shadow-lg shadow-blue-500/30 transition-all transform hover:scale-105">
                INGRESAR
            </button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main x-show="started" x-cloak class="relative z-10">

        <!-- MÚSICA -->
        <button @click="toggleMusic" class="fixed bottom-6 right-6 z-50 p-4 bg-white/10 backdrop-blur-md border border-white/20 rounded-full shadow-2xl">
            <span x-text="playing ? '🔊' : '🔇'" class="text-2xl"></span>
        </button>

        <!-- HEADER CON CASTILLO -->
        <header class="min-h-screen flex flex-col items-center justify-center text-center p-6">
            <!-- Ilustración Castillo -->
            <div class="mb-8 opacity-20">
                <svg width="120" height="120" viewBox="0 0 24 24" fill="currentColor" class="text-blue-200">
                    <path d="M18,20V10l-2,2V3l-2,2V3l-2,2V3l-2,2V3l-2,2V3L4,12v8H18z M11,18H9v-2h2V18z M15,18h-2v-2h2V18z"/>
                </svg>
            </div>
            
            <div class="animate__animated animate__fadeInDown">
                <p class="font-royal text-blue-300 tracking-[0.4em] mb-4 text-sm" x-text="config.textoInicioSub"></p>
                <h1 class="font-title text-7xl md:text-9xl mb-6 gold-text" x-text="config.nombreQuinceanera"></h1>
                <div class="section-divider"></div>
                <p class="max-w-2xl mx-auto text-lg md:text-xl italic px-4 leading-relaxed opacity-90" x-text="config.fraseInicio"></p>
            </div>
        </header>

        <!-- CUENTA REGRESIVA CON CARROZA -->
        <section class="py-16 px-6">
            <div class="max-w-4xl mx-auto glass-card p-10 text-center relative overflow-hidden">
                <!-- Carroza SVG Fondo -->
                <svg class="absolute -left-10 -bottom-10 opacity-5 w-64 h-64" viewBox="0 0 24 24" fill="white">
                    <path d="M19 16c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm-14 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm12-3v-2c0-3.31-2.69-6-6-6s-6 2.69-6 6v2h12z"/>
                </svg>

                <h3 class="font-royal text-xl mb-8 tracking-widest text-blue-300">EL TIEMPO VUELA HACIA LA MEDIA NOCHE</h3>
                <div class="grid grid-cols-4 gap-4 relative z-10">
                    <template x-for="(val, unit) in countdown" :key="unit">
                        <div>
                            <div class="text-3xl md:text-5xl font-bold" x-text="val"></div>
                            <div class="text-[10px] uppercase tracking-widest opacity-50" x-text="unit"></div>
                        </div>
                    </template>
                </div>
