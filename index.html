        :root {
            --royal-blue: #0a192f;
            --magic-blue: #1e3a8a;
            --crystal-blue: #60a5fa;
            --gold: #d4af37;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            scroll-behavior: smooth;
            background-color: var(--royal-blue);
        }

        .font-title { font-family: 'Great Vibes', cursive; }

        /* Fondo con degradado profundo y textura */
        .magic-bg {
            background: radial-gradient(circle at center, #1e40af 0%, #0f172a 70%, #020617 100%);
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* Efecto de Estrellas/Brillo */
        .magic-bg::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.4;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

            animation: floating 3s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.8));
        }
